server:
  port: 8080

spring:
  application:
    name: property-management
  profiles:
    active: local

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:property_management}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 10000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/**/*.xml

# JWT配置
jwt:
  secret: ${JWT_SECRET:your-jwt-secret-key-here}
  expiration: 86400000
  header: Authorization
  prefix: Bearer

# 日志配置
logging:
  level:
    com.property: debug
    org.springframework.security: info

# 文件上传配置
file:
  upload-path: ${FILE_UPLOAD_PATH:${user.home}/property-uploads}
  base-url: ${FILE_BASE_URL:http://localhost:8080}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
